{% extends "base.html" %}

{% block title %}V3 Agent{% endblock %}

{% block content %}
<section class="chat-shell">
  <div class="section-head">
    <h1>V3 On-Call Agent</h1>
    <span class="badge">readFile</span>
  </div>
  <div id="chat-log" class="chat-log" aria-live="polite"></div>
  <form id="chat-form" class="chat-form">
    <input id="chat-input" name="message" type="text" placeholder="数据库主从延迟超过30秒怎么处理？" autocomplete="off" autofocus>
    <button type="submit">发送</button>
  </form>
</section>
{% endblock %}
